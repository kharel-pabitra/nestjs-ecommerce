services:
  app:
    build: .
    container_name: nestjs-ecommerce

    ports:
      - '3000:3000'

    env_file:
      - .env

    depends_on:
      - postgres

  postgres:
    image: postgres:16

    container_name: nestjs-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    volumes:
      - postgres-data:/var/lib/postgresql/data

    ports:
      - '5432:5432'

volumes:
  postgres-data:
